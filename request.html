<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Sheet - The Sheet Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            width: 100%;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }
        
        .hamburger span {
            width: 25px;
            height: 3px;
            background: white;
            margin: 5px 0;
            transition: 0.3s;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        
        nav a:hover {
            opacity: 0.8;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .page-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        
        .page-title h1 {
            font-size: 2.5rem;
        }
        
        .content {
            padding: 60px 20px;
        }
        
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border: 2px solid #667eea;
            border-radius: 8px;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .success-message {
            display: none;
            background: #4caf50;
            color: white;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }
        
        @media (max-width: 768px) {
            .page-title h1 {
                font-size: 1.8rem;
            }
            
            nav ul {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                flex-direction: column;
                gap: 0;
                padding: 1rem;
            }
            
            nav ul.active {
                display: flex;
            }
            
            nav ul li {
                border-bottom: 1px solid rgba(255,255,255,0.2);
                padding: 1rem 0;
            }
            
            nav ul li:last-child {
                border-bottom: none;
            }
            
            .hamburger {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">📊 The Sheet Hub</div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul id="menuItems">
                <li><a href="index.html">Home</a></li>
                <li><a href="sheets.html">Sheets</a></li>
                <li><a href="request.html">Request</a></li>
            </ul>
        </nav>
    </header>
    
    <section class="page-title">
        <div class="container">
            <h1>Request a New Sheet</h1>
            <p>Have an idea for a comparison we should create? Let us know!</p>
        </div>
    </section>
    
    <section class="content">
        <div class="container">
            <div class="form-container">
                <div class="success-message" id="successMessage">
                    ✓ Thank you! Your request has been submitted successfully!
                </div>
                
                <form id="requestForm" action="https://formspree.io/f/xyzqwerty" method="POST">
                    <div class="form-group">
                        <label for="name">Your Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category Name *</label>
                        <input type="text" id="category" name="category" placeholder="e.g., Mountain Bikes, Laptops, Headphones" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="description">Description *</label>
                        <textarea id="description" name="message" placeholder="Tell us what products or items you'd like compared..." required></textarea>
                    </div>
                    
                    <button type="submit">Submit Request</button>
                </form>
            </div>
        </div>
    </section>
    
    <footer>
        <p>&copy; 2026 The Sheet Hub. Created by Leo Ragone. All rights reserved.</p>
    </footer>
    
    <script>
        const hamburger = document.getElementById('hamburger');
        const menuItems = document.getElementById('menuItems');
        
        hamburger.addEventListener('click', function() {
            menuItems.classList.toggle('active');
        });
        
        // Close menu when a link is clicked
        document.querySelectorAll('#menuItems a').forEach(link => {
            link.addEventListener('click', function() {
                menuItems.classList.remove('active');
            });
        });
    </script>
</body>
</html>
